<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 6px 0 12px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        .delete-btn {
            background-color: #e74c3c;
            padding: 5px 10px;
        }
        #balance {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
    </style>
</head>
<body>

<h1>Finance Tracker</h1>
<div id="balance">Balance: €0.00</div>

<form id="transactionForm">
    <h2>Add Transaction</h2>

    <label>Description</label>
    <input type="text" id="description" placeholder="e.g. Rent" required>

    <label>Amount (€)</label>
    <input type="number" id="amount" placeholder="e.g. 500" required>

    <label>Category</label>
    <input type="text" id="category" placeholder="e.g. Housing">

    <label>Type</label>
    <select id="type">
        <option value="INCOME">Income</option>
        <option value="EXPENSE">Expense</option>
    </select>

    <label>Date</label>
    <input type="date" id="date" required>

    <button type="submit">Add Transaction</button>
</form>

<table>
    <thead>
    <tr>
        <th>Description</th>
        <th>Amount</th>
        <th>Category</th>
        <th>Type</th>
        <th>Date</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody id="transactionList">
    </tbody>
</table>

<script>
    const API_URL = "http://localhost:8080/transactions";

    async function loadTransactions() {
        const response = await fetch(API_URL);
        const transactions = await response.json();

        const list = document.getElementById("transactionList");
        list.innerHTML = "";

        let balance = 0;

        transactions.forEach(t => {
            if (t.type === "INCOME") {
                balance += t.amount;
            } else {
                balance -= t.amount;
            }

            const row = `<tr>
                <td>${t.description}</td>
                <td>€${t.amount.toFixed(2)}</td>
                <td>${t.category}</td>
                <td>${t.type}</td>
                <td>${t.date}</td>
                <td><button class="delete-btn" onclick="deleteTransaction(${t.id})">Delete</button></td>
            </tr>`;
            list.innerHTML += row;
        });

        document.getElementById("balance").textContent =
            `Balance: €${balance.toFixed(2)}`;
    }

    async function deleteTransaction(id) {
        await fetch(`${API_URL}/${id}`, { method: "DELETE" });
        loadTransactions();
    }

    document.getElementById("transactionForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        const transaction = {
            description: document.getElementById("description").value,
            amount: parseFloat(document.getElementById("amount").value),
            category: document.getElementById("category").value,
            type: document.getElementById("type").value,
            date: document.getElementById("date").value
        };

        await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(transaction)
        });

        loadTransactions();
        this.reset();
    });

    loadTransactions();
</script>

</body>
</html>
